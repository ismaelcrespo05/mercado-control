{% load static %}
<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — VenceYa</title>
  
  <!-- i18next CDN -->
  <script src="https://cdn.jsdelivr.net/npm/i18next@23.5.0/i18next.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next-http-backend@2.4.2/i18nextHttpBackend.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/i18next-browser-languagedetector@7.2.0/i18nextBrowserLanguageDetector.min.js"></script>
  <style>
    /* ===== DARK THEME (default) ===== */
    [data-theme="dark"] {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --text: #e8eaf0;
      --text-muted: #7a8099;
    }

    /* ===== LIGHT THEME ===== */
    [data-theme="light"] {
      --bg: #f0f2f8;
      --surface: #ffffff;
      --surface2: #e8eaf2;
      --border: #d0d4e8;
      --text: #1a1d27;
      --text-muted: #5a6080;
    }

    :root {
      --accent: #00c988;
      --accent-dim: #00a870;
      --danger: #ff4d6d;
      --warn: #ffb830;
      --ok: #00c988;
      --radius: 12px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      max-width: 400px;
      width: 100%;
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.65rem 0.9rem;
      font-size: 0.95rem;
      font-family: var(--font);
      transition: border-color 0.15s;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .messages {
      list-style: none;
      margin-bottom: 1.5rem;
    }

    .messages li {
      padding: 0.75rem 1rem;
      border-radius: var(--radius);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
      border-left: 3px solid var(--danger);
      background: color-mix(in srgb, var(--danger) 8%, var(--surface));
      color: var(--text);
    }

    .btn {
      display: block;
      width: 100%;
      padding: 0.65rem 1rem;
      border-radius: 8px;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      font-family: var(--font);
      margin-top: 1.5rem;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover {
      background: var(--accent-dim);
    }

    .theme-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.15s;
    }

    .theme-btn:hover {
      color: var(--text);
      border-color: var(--accent);
    }

    @media (max-width: 640px) {
      .login-container {
        padding: 1.5rem;
      }

      .login-header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <h1><span>📦</span> VenceYa</h1>
    <p data-i18n="login.subtitle">Control de vencimientos</p>
  </div>

  {% if messages %}
  <ul class="messages">
    {% for msg in messages %}
    <li>{{ msg }}</li>
    {% endfor %}
  </ul>
  {% endif %}

  <form method="post">
    {% csrf_token %}

    <div class="form-group">
      <label for="username" data-i18n="login.username">Usuario</label>
      <input 
        type="text" 
        id="username" 
        name="username" 
        placeholder="usuario@example.com"
        required 
        autofocus
      >
    </div>

    <div class="form-group">
      <label for="password" data-i18n="login.password">Contraseña</label>
      <input 
        type="password" 
        id="password" 
        name="password" 
        placeholder="••••••••"
        required
      >
    </div>

    <button type="submit" class="btn btn-primary" data-i18n="login.submit">Iniciar sesión</button>
  </form>
</div>

<button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Cambiar tema">🌙</button>

<!-- i18next Config -->
<script src="{% static 'js/i18next-config.js' %}"></script>

<script>
let currentTheme = localStorage.getItem('theme') || 'dark';

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.getElementById('themeBtn').textContent = theme === 'dark' ? '🌙' : '☀️';
  localStorage.setItem('theme', theme);
}

function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  applyTheme(currentTheme);
}

applyTheme(currentTheme);
</script>

</body>
</html>
