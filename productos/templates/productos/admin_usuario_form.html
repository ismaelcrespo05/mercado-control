{% extends "productos/base.html" %}

{% block title %}{% if es_edicion %}Editar usuario{% else %}Nuevo usuario{% endif %} - VenceYa{% endblock %}

{% block content %}
<h1>{% if es_edicion %}Editar usuario{% else %}Nuevo usuario{% endif %}</h1>

<div class="card" style="max-width:640px; width:100%; margin:0 auto;">
  <form method="post">
    {% csrf_token %}

    <div class="grid-2col">
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          name="username"
          value="{{ usuario_obj.username|default:'' }}"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          value="{{ usuario_obj.email|default:'' }}"
        >
      </div>
    </div>

    <div class="grid-2col">
      <div class="form-group">
        <label for="first_name">Nombre</label>
        <input
          type="text"
          id="first_name"
          name="first_name"
          value="{{ usuario_obj.first_name|default:'' }}"
        >
      </div>

      <div class="form-group">
        <label for="last_name">Apellido</label>
        <input
          type="text"
          id="last_name"
          name="last_name"
          value="{{ usuario_obj.last_name|default:'' }}"
        >
      </div>
    </div>

    <div class="grid-2col">
      <div class="form-group">
        <label for="rol">Rol</label>
        <select id="rol" name="rol" required>
          {% for codigo, nombre in roles %}
          <option value="{{ codigo }}" {% if rol_actual == codigo %}selected{% endif %}>{{ nombre }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="is_active">Estado</label>
        <select id="is_active" name="is_active" required>
          <option value="1" {% if not es_edicion or usuario_obj.is_active %}selected{% endif %}>Activo</option>
          <option value="0" {% if es_edicion and not usuario_obj.is_active %}selected{% endif %}>Inactivo</option>
        </select>
      </div>
    </div>

    <div class="grid-2col">
      <div class="form-group">
        <label for="password">{% if es_edicion %}Nueva contraseña{% else %}Contraseña{% endif %}</label>
        <input
          type="password"
          id="password"
          name="password"
          {% if not es_edicion %}required{% endif %}
        >
      </div>

      <div class="form-group">
        <label for="password_confirm">Confirmar contraseña</label>
        <input
          type="password"
          id="password_confirm"
          name="password_confirm"
          {% if not es_edicion %}required{% endif %}
        >
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Guardar usuario</button>
      <a href="{% url 'admin_panel' %}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
